<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar System Simulator WASM</title>
    <style>
      :root {
        color-scheme: dark;
        background: #030712;
        color: #e5f4ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.18), transparent 28rem),
          radial-gradient(circle at 80% 20%, rgba(251, 191, 36, 0.10), transparent 22rem),
          #030712;
      }

      main {
        width: min(100vw - 2rem, 1320px);
      }

      .frame {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      }

      .status {
        padding: 0.85rem 1rem;
        color: #bae6fd;
        font-size: 0.95rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      }

      canvas.emscripten {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="frame" aria-label="Solar System Simulator WebAssembly runtime">
        <div id="status" class="status">Downloading simulator…</div>
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
      </section>
    </main>

    <script>
      const statusElement = document.getElementById('status');
      var Module = {
        canvas: document.getElementById('canvas'),
        print(text) {
          console.log(text);
        },
        printErr(text) {
          console.error(text);
          statusElement.textContent = text;
        },
        setStatus(text) {
          statusElement.textContent = text || 'Running physics simulation';
        },
        monitorRunDependencies(left) {
          if (left > 0) {
            statusElement.textContent = `Preparing simulator (${left} files remaining)…`;
          } else {
            statusElement.textContent = 'Starting simulator…';
          }
        }
      };
      window.onerror = function(message) {
        statusElement.textContent = `Runtime error: ${message}`;
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
