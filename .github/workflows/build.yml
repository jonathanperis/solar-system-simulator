name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  native:
    name: Native C/raylib build and tests
    runs-on: ubuntu-latest
    env:
      RAYLIB_LIBS: -lraylib -lm -ldl -lpthread -lGL -lrt -lX11 -lXrandr -lXi -lXinerama -lXcursor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler and raylib system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libasound2-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            mesa-common-dev \
            pkg-config

      - name: Build and install raylib
        run: |
          git clone --depth 1 --branch 6.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build /tmp/raylib/build --parallel
          sudo cmake --install /tmp/raylib/build
          sudo ldconfig

      - name: Build simulator
        run: make clean && make

      - name: Run C test suite
        run: make test

  wasm:
    name: WebAssembly artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.58

      - name: Build raylib for WebAssembly
        run: |
          git clone --depth 1 --branch 6.0 https://github.com/raysan5/raylib.git /tmp/raylib
          make PLATFORM=PLATFORM_WEB -C /tmp/raylib/src

      - name: Build and smoke-check WebAssembly bundle
        run: make web RAYLIB_WEB_SRC=/tmp/raylib/src

      - name: Package WebAssembly artifact
        run: make dist-wasm RAYLIB_WEB_SRC=/tmp/raylib/src

      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-simulator-wasm
          path: |
            build/web/solar-system-simulator.html
            build/web/solar-system-simulator.js
            build/web/solar-system-simulator.wasm
            build/solar-system-simulator-wasm.zip
